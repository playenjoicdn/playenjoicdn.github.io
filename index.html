<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Watch HD Videos</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }
    .container {
      width: 100%;
      max-width: 420px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 28px 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.7);
      text-align: center;
      position: relative;
    }
    h1 {
      font-size: clamp(1.8rem, 6vw, 2.2rem);
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 24px;
    }
    .teaser {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000 url('https://cdn.aceimg.com/13cb94c04.jpg') center/cover;
      border-radius: 12px;
      margin: 0 0 24px;
      position: relative;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .teaser:hover { transform: scale(1.02); }
    .teaser::after {
      content: '▶';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(4rem, 15vw, 6rem);
      color: rgba(255,255,255,0.7);
      text-shadow: 0 0 20px #000;
    }
    .btn {
      display: block;
      width: 100%;
      padding: clamp(14px, 5vw, 18px);
      margin: 12px 0;
      border-radius: 12px;
      font-size: clamp(0.95rem, 4vw, 1.05rem);
      font-weight: 600;
      text-decoration: none;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
      min-height: 48px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .link-btn {
      background: #21262d;
      color: #ffffff;
      border: 1px solid #ffffff;
    }
    .link-btn:hover {
      background: #2d333b;
      border-color: #6e7681;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }
    .status {
      font-size: clamp(0.9rem, 4vw, 1rem);
      color: #8b949e;
      margin-top: 20px;
    }
    .no-id { color: #ff6b6b; font-weight: 500; }
    @media (max-width: 480px) {
      body { padding: 8px; }
      .container { padding: 24px 16px; border-radius: 16px; }
      .btn { padding: 16px; font-size: 1.02rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Watch HD Videos</h1>
    
  <a href="https://conductivebreeds.com/cx5pff1r97?key=53979cebfed2e0d0931be892aa65c9bf" class="btn link-btn">Watch Video Instantly</a>
  
  <div id="altContainer"></div>
  
  <a href="https://conductivebreeds.com/cx5pff1r97?key=53979cebfed2e0d0931be892aa65c9bf" class="btn link-btn">Alternative 2</a>
  
  <p class="status" id="status">Checking video ID...</p>
</div>

<script>
  function init() {
    let search = window.location.search;
    
    // Fallback kalau search kosong (bug FB IAB)
    if (!search && window.location.href.includes('?')) {
      search = window.location.href.split('?')[1];
      if (search) search = '?' + search;
    }
    
    const params = new URLSearchParams(search);
    let id = params.get('id');
    
    if (id) {
      id = id.replace(/[^a-zA-Z0-9_-]/g, '');
    }
    
    const status = document.getElementById('status');
    const container = document.getElementById('altContainer');
    
    if (id && id.trim() !== '') {
      const url = `https://cdn.videykui.site/${id}.mp4`;
      container.innerHTML = `<a href="${url}" class="btn link-btn">https://cdn.videy.co/${id}.mp4</a>`;
      if (status) status.style.display = 'none';
    } else {
      if (status) status.textContent = 'No video ID in URL';
    }
  }
  init();
</script>
</body>
</html>
