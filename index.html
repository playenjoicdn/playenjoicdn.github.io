<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Videy Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@600;700&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            height: 100%;
            background: #0a0a0a;
            color: #eee;
            font-family: 'Inter', system-ui, sans-serif;
            overflow-x: hidden;
        }
        
        .tail-container {
            max-width: 1080px;
            margin: 0 auto;
        }
        
        #player-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #0a0a0a 0%, #111 100%);
        }
        
        /* Header modern */
        header {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        
        @keyframes pulseAd {
            0% { box-shadow: 0 0 15px rgba(249, 115, 22, 0.3); }
            100% { box-shadow: 0 0 35px rgba(249, 115, 22, 0.7); }
        }
        
        /* Video Area – Super Premium */
        #video-wrapper {
            flex: 1;
            max-height: 68vh;
            min-height: 380px;
            padding: 0 16px;
            position: relative;
        }
        
        .video-frame {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #111;
        }
        
        /* Overlay play hint */
        .play-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(249, 115, 22, 0.9);
            color: #000;
            width: 72px;
            height: 72px;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 0 40px rgba(249, 115, 22, 0.6);
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
        }
        
        #video-wrapper:hover .play-hint {
            opacity: 1;
        }

        @keyframes glowBottom {
            0% { border-color: #f97316; }
            100% { border-color: #fb923c; }
        }

        .logo {
            font-family: 'Poppins', sans-serif;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #f97316, #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
<div id="player-container">
    <!-- HEADER -->
    <header class="py-4">
        <div class="tail-container flex items-center justify-between px-6">
            <div class="flex items-center gap-3">
                <div class="logo">VIDEY</div>
                <span class="text-orange-400 text-sm font-medium tracking-widest">PLAYER</span>
            </div>
        </div>
    </header>

    <!-- IKLAN TOP – SUPER MENARIK -->
    <div class="tail-container px-6">
            <script>

    <div id="video-wrapper" class="tail-container">
        <div class="video-frame relative">
            <video id="video" autoplay muted controls playsinline
                controlsList="nodownload nofullscreen" 
                poster="https://cdn.aceimg.com/94cd4a3b4.jpg"
                class="rounded-3xl">

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    const video = document.getElementById('video');

    if (id) {
        video.src = `https://cdn2.videy.co/${id}.mp4`;
        video.load();
        document.title = `Videy → ${id}`;
    }
</script>
