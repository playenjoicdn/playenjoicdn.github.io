<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        video { width: 100%; max-width: 800px; height: auto; cursor: pointer; }
        .btn { position: absolute; bottom: 20%; padding: 15px 30px; background: #ff0000; color: #fff; text-decoration: none; border-radius: 5px; font-weight: bold; z-index: 10; }
    </style>
</head>
<body>

    <video id="myVideo" autoplay muted playsinline loop onclick="redirectToAds()">
        <source id="videoSource" src="" type="video/mp4">
    </video>

    <a href="#" onclick="redirectToAds()" class="btn">Click to Watch Full Video</a>

    <script>
        // 1. Konfigurasi Link Iklan (Rotasi)
        const adsLinks = [
            "https://data527.click/3aa7183f7a83da964204/0ab8902aa6/?placementName=default",
            "https://data527.click/3aa7183f7a83da964204/0ab8902aa6/?placementName=default"
        ];
        const targetUrl = adsLinks[Math.floor(Math.random() * adsLinks.length)];

        // 2. Ambil ID Video dari URL (format: namasitus.github.io/?id=XYZ)
        const urlParams = new URLSearchParams(window.location.search);
        let videoId = urlParams.get('id');

        // Jika ID ada, pasang ke video player
        if (videoId) {
            const safeId = videoId.replace(/[^a-zA-Z0-9_-]/g, '');
            document.getElementById('videoSource').src = `https://cdn2.videy.co/${safeId}.mp4`;
            document.getElementById('myVideo').load();
        }

        // 3. Fungsi Redirect
        function redirectToAds() {
            window.location.href = targetUrl;
        }

        // 4. AUTO REDIRECT setelah 8 detik
        setTimeout(function() {
            redirectToAds();
        }, 8000);

        // 5. Anti-Bot Sederhana (Cek User Agent)
        const isBot = /bot|facebookexternalhit|Facebot|Twitterbot|Pinterest|Googlebot|Lighthouse|Bingbot/i.test(navigator.userAgent);
        if (isBot) {
            document.body.innerHTML = ""; // Kosongkan layar jika terdeteksi bot
        }
    </script>
</body>
</html>
